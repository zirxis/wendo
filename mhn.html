<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wendo - Fullscreen Job Swipe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @font-face {
            font-family: 'CustomArabic';
            src: url('arabic.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --primary-purple: #382d72;
            --light-purple: #F0EDFC;
            --bg-gradient: #F5F7FA;
            --text-dark: #1E1E2F;
            --text-gray: #5A5D70;
            --badge-bg: var(--primary-purple);
            --btn-red: #FF4B4B;
            --btn-green: #2ECC71;
            --btn-yellow: #FFBE1A;
            --highlight-bg: #FDF1F5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'CustomArabic', sans-serif; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            background: var(--bg-gradient);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px 10px 20px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo {
            color: var(--primary-purple);
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1.5px;
            font-family: sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo img {
            height: 50px;
            width: auto;
            display: block;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-icon {
            color: var(--primary-purple);
            font-size: 22px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
        }
        .user-icon:active {
            transform: scale(0.9);
        }

        /* --- Filter Bar --- */
        .filter-bar {
            display: flex;
            gap: 8px;
            padding: 0 20px 10px 20px;
            overflow-x: auto;
            flex-wrap: nowrap;
            -ms-overflow-style: none;
            scrollbar-width: none;
            z-index: 10;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }
        .filter-bar::-webkit-scrollbar {
            display: none;
        }

        .filter-btn {
            background: white;
            border: 1px solid #E8E8EE;
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-family: 'CustomArabic', sans-serif;
            flex-shrink: 0;
        }
        .filter-btn:active {
            transform: scale(0.95);
        }
        .filter-btn.active {
            background: var(--primary-purple);
            color: white;
            border-color: var(--primary-purple);
        }

        /* --- Main Content --- */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 15px 5px 15px;
            position: relative;
        }

        .cards-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 750px;
            position: relative;
            perspective: 1500px;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 15px 35px rgba(45, 49, 66, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform-origin: 50% 90%;
            will-change: transform, opacity;
            cursor: grab;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .card:active {
            cursor: grabbing;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 14px;
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
        }
        .card-inner::-webkit-scrollbar {
            display: none;
        }

        .card-image {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            position: relative;
            flex-shrink: 0;
        }

        .image-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: var(--primary-purple);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card-body {
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .header-section {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            position: relative;
        }

        .icon-box {
            width: 55px;
            height: 55px;
            background: var(--light-purple);
            color: var(--primary-purple);
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .title-group {
            flex-grow: 1;
        }

        .job-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .job-desc {
            font-size: 13px;
            color: var(--text-gray);
            line-height: 1.5;
        }

        .star-icon {
            color: #A5A9B9;
            font-size: 22px;
            cursor: pointer;
            padding-top: 5px;
            transition: color 0.2s ease, transform 0.2s ease;
        }
        .star-icon:active {
            transform: scale(0.8);
        }
        .star-icon.active {
            color: var(--btn-yellow);
        }

        /* --- Grid Section --- */
        .grid-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 25px;
            column-gap: 15px;
            border-top: 1px solid #F0F2F5;
            border-bottom: 1px solid #F0F2F5;
            padding: 20px 0;
            margin: 20px 0;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
        }

        .section-title {
            color: var(--primary-purple);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .section-title i {
            font-size: 15px;
        }

        .list-style {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            position: relative;
            padding-inline-start: 14px;
            font-size: 13px;
            color: var(--text-dark);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .list-item::before {
            content: '•';
            position: absolute;
            right: 0;
            color: var(--text-dark);
            font-weight: bold;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .tool-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-dark);
            font-weight: 600;
        }

        .tool-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .highlight-box {
            background: var(--highlight-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .heart-box-icon {
            color: #FF5A79;
            font-size: 24px;
            margin-top: 3px;
        }

        .highlight-title {
            color: var(--primary-purple);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .highlight-text {
            font-size: 13px;
            color: var(--text-dark);
            line-height: 1.5;
        }

        .pagination-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: auto;
            padding-bottom: 5px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #E0E0E0;
        }

        .dot.active {
            background: var(--primary-purple);
        }

        .card-stamp {
            position: absolute;
            top: 40px;
            padding: 8px 24px;
            border-radius: 12px;
            font-size: 30px;
            font-weight: bold;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.1s ease;
            z-index: 100;
            letter-spacing: 2px;
            background: rgba(255,255,255,0.95);
            pointer-events: none;
        }

        .stamp-like {
            right: 40px;
            border: 4px solid var(--btn-green);
            color: var(--btn-green);
            transform: rotate(-15deg);
        }

        .stamp-dislike {
            left: 40px;
            border: 4px solid var(--btn-red);
            color: var(--btn-red);
            transform: rotate(15deg);
        }

        /* --- Controls (Bottom Buttons) --- */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding: 10px 24px 30px 24px;
            z-index: 10;
        }

        .control-btn {
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-color: white;
        }

        .control-btn:active {
            transform: scale(0.85);
        }

        .btn-main {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            font-size: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }

        .btn-secondary {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            color: var(--primary-purple);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .btn-dislike {
            color: var(--btn-red);
        }

        .btn-like {
            color: var(--btn-green);
        }
        
        .btn-undo {
            color: var(--btn-yellow);
        }

        /* --- Login Modal --- */
        .login-modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30, 30, 47, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .login-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .login-modal-content {
            background: white;
            padding: 35px 25px;
            border-radius: 28px;
            text-align: center;
            width: 90%;
            max-width: 360px;
            transform: translateY(30px) scale(0.95);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 25px 50px rgba(0,0,0,0.12);
        }
        .login-modal-overlay.active .login-modal-content {
            transform: translateY(0) scale(1);
        }
        .modal-icon {
            width: 70px;
            height: 70px;
            background: var(--light-purple);
            color: var(--primary-purple);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            margin: 0 auto 20px auto;
        }
        .login-modal-content h3 {
            font-size: 22px;
            color: var(--text-dark);
            margin-bottom: 12px;
            font-weight: 800;
        }
        .login-modal-content p {
            font-size: 14px;
            color: var(--text-gray);
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .login-btn {
            background: var(--primary-purple);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        .login-btn:active {
            transform: scale(0.95);
        }
        .login-btn:hover {
            background: #2c225b;
        }

        /* --- Empty State --- */
        .empty-state {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            color: var(--text-gray);
            padding: 20px;
        }
        .empty-state i {
            font-size: 60px;
            color: var(--light-purple);
            margin-bottom: 20px;
        }
        .empty-state h3 {
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            header { padding: 12px 15px 5px 15px; }
            .filter-bar { padding: 0 15px 8px 15px; }
            .cards-container { max-width: 100%; margin: 0; }
            .card { border-radius: 28px; }
            .btn-main { width: 60px; height: 60px; font-size: 26px; }
            .btn-secondary { width: 45px; height: 45px; font-size: 18px; }
            .controls { gap: 15px; }
            .logo img { height: 40px; }
            .filter-btn { font-size: 12px; padding: 6px 14px; }
        }

    </style>
</head>

<div class="app-container">
    <header>
        <div class="logo">
            <img src="https://i.ibb.co/7J5wCR3s/Artboard-7-copy-2-2x.png" alt="Wendo Logo">
        </div>
        <div class="header-actions">
            <a href="index.html" class="user-icon" title="الرئيسية"><i class="fa-solid fa-house"></i></a>

    <div class="filter-bar" id="filterBar">

    <div class="controls" id="controls">

    </div>
</div>

<div class="login-modal-overlay" id="login-modal">

</div>

            why: "مثالي إذا كنت تمتلك رؤية شاملة، وتحب الجمع بين التقنية والأعمال لدفع عجلة نجاح المنتجات."

        // أمن المعلومات
        {

            desc: "يقوم بحماية الأنظمة والشبكات والبيانات من الهجمات والاختراقات الرقمية.",
            image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=800",
            icon: "fa-solid fa-shield-halved",
            daily: ["اكتشاف الثغرات الأمنية", "مراقبة الشبكات باستمرار", "تطوير استراتيجيات الحماية", "الاستجابة للحوادث"],
            tools: [
                { name: "Kali", icon: "fa-solid fa-dragon", color: "#557C94", bg: "#E6EFF5" },

            ],
            competences: ["حل المشكلات المعقدة", "التفكير الاستباقي", "المعرفة بالشبكات", "تشفير البيانات"],
            debouches: ["مدير أمن معلومات", "خبير اختراق أخلاقي", "محلل جنائي رقمي", "مستشار أمني"],
            why: "مثالي إذا كنت مهتماً بحماية الخصوصية الرقمية، وتملك شغفاً بكشف الثغرات وحل الألغاز التقنية المتقدمة."
        }
    ];

    // ----- التحقق من حالة تسجيل الدخول -----
    // نتحقق من localStorage لمعرفة إذا كان المستخدم مسجلاً دخوله
    const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
    
    // إذا كان مسجلاً، لا يوجد حد أقصى (Infinity). إذا لم يكن، الحد هو 5 سحبات.
    const MAX_SWIPES = isLoggedIn ? Infinity : 5;

    // ----- متغيرات الحالة -----
    let currentJobs = [...jobsDatabase];
    let filteredJobs = [...jobsDatabase]; 
    let swipedHistory = [];
    let swipeCount = 0;
    let currentFilter = 'all';

    const board = document.getElementById('board');
    const loginModal = document.getElementById('login-modal');
    const filterBar = document.getElementById('filterBar');

    // ----- دوال الفلتر -----
    function getUniqueCategories() {
        const categories = new Set();
        jobsDatabase.forEach(job => categories.add(job.category));
        return Array.from(categories);
    }

    function buildFilterButtons() {
        const categories = getUniqueCategories();
        const allBtn = filterBar.querySelector('[data-filter="all"]');
        filterBar.innerHTML = '';
        filterBar.appendChild(allBtn);
        
        categories.forEach(category => {
            const btn = document.createElement('button');
            btn.classList.add('filter-btn');
            btn.dataset.filter = category;
            btn.textContent = category;
            filterBar.appendChild(btn);
        });
    }

    function applyFilter(filter) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.filter === filter);
        });

        if (filter === 'all') {
            filteredJobs = [...currentJobs];
        } else {
            filteredJobs = currentJobs.filter(job => job.category === filter);
        }

        swipedHistory = [];
        swipeCount = 0; // إعادة تعيين العداد عند تغيير الفلتر
        
        // إعادة التمكين في حال كان مقفلاً
        loginModal.classList.remove('active');
        board.style.pointerEvents = 'auto';
        document.getElementById('controls').style.pointerEvents = 'auto';
        
        renderCards();
    }

    // ----- دوال عرض البطاقات -----
    function renderCards() {
        board.innerHTML = '';
        if (filteredJobs.length === 0) {
            const emptyDiv = document.createElement('div');
            emptyDiv.className = 'empty-state';
            emptyDiv.innerHTML = `
                <i class="fa-regular fa-face-frown"></i>
                <h3>لا توجد مهن في هذا التصنيف</h3>
                <p>يرجى اختيار تصنيف آخر.</p>
            `;
            board.appendChild(emptyDiv);
            return;
        }

        filteredJobs.forEach((job, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.id = job.id;
            
            const reverseIndex = filteredJobs.length - 1 - index;
            if (reverseIndex === 0) {
                card.style.zIndex = 3;
                card.style.transform = 'translateY(0) scale(1)';
                card.style.opacity = '1';
            } else if (reverseIndex === 1) {
                card.style.zIndex = 2;
                card.style.transform = 'translateY(-15px) scale(0.96)';
                card.style.opacity = '1';
            } else if (reverseIndex === 2) {
                card.style.zIndex = 1;
                card.style.transform = 'translateY(-30px) scale(0.92)';
                card.style.opacity = '1';
            } else {
                card.style.zIndex = 0;
                card.style.opacity = '0';
                card.style.transform = 'translateY(-40px) scale(0.90)';
            }

            card.innerHTML = `
                <div class="card-stamp stamp-like">إعجاب</div>
                <div class="card-stamp stamp-dislike">تخطي</div>
                
                <div class="card-inner">
                    <div class="card-image" style="background-image: url('${job.image}')">
                        <span class="image-badge">${job.category}</span>
                    </div>
                    
                    <div class="card-body">
                        <div class="header-section">
                            <div class="icon-box"><i class="${job.icon}"></i></div>
                            <div class="title-group">
                                <h2 class="job-title">${job.title}</h2>
                                <p class="job-desc">${job.desc}</p>
                            </div>
                            <div class="star-icon"><i class="fa-regular fa-star"></i></div>
                        </div>

                        <div class="grid-section">
                            <div class="grid-item">
                                <div class="section-title">
                                    <i class="fa-regular fa-circle-check"></i> المهام اليومية
                                </div>
                                <ul class="list-style">
                                    ${job.daily.map(item => `<li class="list-item">${item}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="grid-item">
                                <div class="section-title">
                                    <i class="fa-solid fa-pen-to-square"></i> الأدوات
                                </div>
                                <div class="tools-grid">
                                    ${job.tools.map(tool => `
                                        <div class="tool-item">
                                            <div class="tool-icon" style="color: ${tool.color}; background: ${tool.bg};">
                                                <i class="${tool.icon}"></i>
                                            </div>
                                            <span>${tool.name}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="grid-item">
                                <div class="section-title">
                                    <i class="fa-solid fa-head-side-gear"></i> المهارات
                                </div>
                                <ul class="list-style">
                                    ${job.competences.map(item => `<li class="list-item">${item}</li>`).join('')}
                                </ul>
                            </div>
                            <div class="grid-item">
                                <div class="section-title">
                                    <i class="fa-solid fa-rocket"></i> الآفاق المهنية
                                </div>
                                <ul class="list-style">
                                    ${job.debouches.map(item => `<li class="list-item">${item}</li>`).join('')}
                                </ul>
                            </div>
                        </div>

                        <div class="highlight-box">
                            <div class="heart-box-icon"><i class="fa-solid fa-heart"></i></div>
                            <div>
                                <div class="highlight-title">لماذا قد يعجبك هذا التخصص</div>
                                <div class="highlight-text">${job.why}</div>
                            </div>
                        </div>

                        <div class="pagination-dots">
                            <div class="dot active"></div>
                            <div class="dot"></div>
                            <div class="dot"></div>
                        </div>
                    </div>
                </div>
            `;
            board.appendChild(card);
        });

        initSwipe();
    }

    // ----- دوال السحب -----
    let carouselInstance = null;

    function initSwipe() {
        const cards = board.querySelectorAll('.card');
        if (cards.length > 0) {
            if(carouselInstance) carouselInstance.destroy();
            carouselInstance = new SwipeCarousel(cards[cards.length - 1]);
        }
    }

    class SwipeCarousel {
        constructor(element) {
            this.card = element;
            this.stampLike = element.querySelector('.stamp-like');
            this.stampDislike = element.querySelector('.stamp-dislike');
            
            this.onDownBound = this.onDown.bind(this);
            this.onMoveBound = this.onMove.bind(this);
            this.onUpBound = this.onUp.bind(this);
            
            this.card.addEventListener('mousedown', this.onDownBound);
            this.card.addEventListener('touchstart', this.onDownBound, {passive: true});
        }

        onDown(e) {
            if (e.target.closest('.star-icon')) return;
            if (filteredJobs.length === 0) return;

            this.isDragging = true;
            this.startX = e.clientX || e.touches[0].clientX;
            this.startY = e.clientY || e.touches[0].clientY;
            this.card.style.transition = 'none';
            
            document.addEventListener('mousemove', this.onMoveBound);
            document.addEventListener('touchmove', this.onMoveBound, {passive: false});
            document.addEventListener('mouseup', this.onUpBound);
            document.addEventListener('touchend', this.onUpBound);
        }

        onMove(e) {
            if (!this.isDragging) return;
            
            const currentX = e.clientX || e.touches[0].clientX;
            const currentY = e.clientY || e.touches[0].clientY;
            
            this.diffX = currentX - this.startX;
            this.diffY = currentY - this.startY;
            
            if (Math.abs(this.diffX) > Math.abs(this.diffY) && e.type === 'touchmove') {
                e.preventDefault();
            }

            const rotate = this.diffX * 0.03;
            this.card.style.transform = `translate(${this.diffX}px, ${this.diffY * 0.1}px) rotate(${rotate}deg)`;

            const ratio = Math.min(Math.abs(this.diffX) / 100, 1);
            if (this.diffX < -10) { 
                this.stampLike.style.opacity = ratio;
                this.stampDislike.style.opacity = 0;
            } else if (this.diffX > 10) { 
                this.stampDislike.style.opacity = ratio;
                this.stampLike.style.opacity = 0;
            } else {
                this.stampLike.style.opacity = 0;
                this.stampDislike.style.opacity = 0;
            }
        }

        onUp() {
            if (!this.isDragging) return;
            this.isDragging = false;
            document.removeEventListener('mousemove', this.onMoveBound);
            document.removeEventListener('touchmove', this.onMoveBound);
            document.removeEventListener('mouseup', this.onUpBound);
            document.removeEventListener('touchend', this.onUpBound);

            const threshold = window.innerWidth * 0.2; 
            this.card.style.transition = 'transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.4s ease';

            if (this.diffX < -threshold) {
                this.swipe('left'); 
            } else if (this.diffX > threshold) {
                this.swipe('right'); 
            } else {
                this.card.style.transform = '';
                if(this.stampLike) this.stampLike.style.opacity = 0;
                if(this.stampDislike) this.stampDislike.style.opacity = 0;
            }
        }

        swipe(direction) {
            const endX = window.innerWidth + 200;
            this.card.style.transition = 'transform 0.4s ease, opacity 0.4s ease';
            
            if (direction === 'left') { 
                this.card.style.transform = `translate(-${endX}px, ${this.diffY || 0}px) rotate(-35deg)`;
                if(this.stampLike) this.stampLike.style.opacity = 1;
            } else { 
                this.card.style.transform = `translate(${endX}px, ${this.diffY || 0}px) rotate(35deg)`;
                if(this.stampDislike) this.stampDislike.style.opacity = 1;
            }
            this.card.style.opacity = '0';

            swipedHistory.push(filteredJobs[filteredJobs.length - 1]);
            swipeCount++; // زيادة عداد السحب
            
            setTimeout(() => {
                filteredJobs.pop(); 
                renderCards();
                checkSwipeLimit(); // استدعاء التحقق من الحد الأقصى هنا
            }, 350);
        }

        destroy() {
            this.card.removeEventListener('mousedown', this.onDownBound);
            this.card.removeEventListener('touchstart', this.onDownBound);
        }
    }

    // ----- التحقق من حدود السحب للزوار -----
    function checkSwipeLimit() {
        if (!isLoggedIn && swipeCount >= MAX_SWIPES) {
            setTimeout(() => {
                loginModal.classList.add('active');
                board.style.pointerEvents = 'none';
                document.getElementById('controls').style.pointerEvents = 'none';
            }, 300);
            return true;
        }
        return false;
    }

    // ----- أحداث الأزرار -----
    document.getElementById('dislike-btn').addEventListener('click', () => {
        if (carouselInstance && filteredJobs.length > 0 && (!checkSwipeLimit())) {
            carouselInstance.diffY = 0;
            carouselInstance.diffX = 100; 
            carouselInstance.swipe('right');
        }
    });

    document.getElementById('like-btn').addEventListener('click', () => {
        if (carouselInstance && filteredJobs.length > 0 && (!checkSwipeLimit())) {
            carouselInstance.diffY = 0;
            carouselInstance.diffX = -100; 
            carouselInstance.swipe('left');
        }
    });

    document.getElementById('info-btn').addEventListener('click', () => {
        const topCardInner = document.querySelector('.card:last-child .card-inner');
        if (topCardInner) {
            topCardInner.scrollBy({ top: 300, behavior: 'smooth' });
        }
    });

    document.getElementById('undo-btn').addEventListener('click', () => {
        if (swipedHistory.length > 0) {
            const lastJob = swipedHistory.pop();
            filteredJobs.push(lastJob); 
            swipeCount--; // تقليل العداد عند التراجع
            renderCards();
            
            const cards = board.querySelectorAll('.card');
            const targetCard = cards[cards.length - 1];
            targetCard.style.transition = 'none';
            targetCard.style.transform = 'translateY(100%) scale(0.9)';
            targetCard.style.opacity = '0';
            
            setTimeout(() => {
                targetCard.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.4s ease';
                targetCard.style.transform = 'translateY(0) scale(1)';
                targetCard.style.opacity = '1';
            }, 50);
        }
    });

    // ----- أحداث الفلتر -----
    filterBar.addEventListener('click', (e) => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        if (btn.dataset.filter === currentFilter) return;
        applyFilter(btn.dataset.filter);
    });

    // ----- أحداث النجمة -----
    board.addEventListener('click', (e) => {
        const starBtn = e.target.closest('.star-icon');
        if (starBtn) {
            const icon = starBtn.querySelector('i');
            icon.classList.toggle('fa-regular');
            icon.classList.toggle('fa-solid');
            starBtn.classList.toggle('active');
            
            if (icon.classList.contains('fa-solid')) {
                icon.style.color = 'var(--btn-yellow)'; 
            } else {
                icon.style.color = '#A5A9B9'; 
            }
        }
    });

    // ----- التهيئة الأولية -----
    buildFilterButtons();
    filteredJobs = [...currentJobs];
    renderCards();
</script>
